version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mcp-server-1:
    build: .
    ports:
      - "8080:8080"
    environment:
      - REDIS_ADDR=redis:6379
    depends_on:
      redis:
        condition: service_healthy
    command: ["./scaled-server", "-http=:8080", "-redis=redis:6379"]

  mcp-server-2:
    build: .
    ports:
      - "8081:8080"
    environment:
      - REDIS_ADDR=redis:6379
    depends_on:
      redis:
        condition: service_healthy
    command: ["./scaled-server", "-http=:8080", "-redis=redis:6379"]

  mcp-server-3:
    build: .
    ports:
      - "8082:8080"
    environment:
      - REDIS_ADDR=redis:6379
    depends_on:
      redis:
        condition: service_healthy
    command: ["./scaled-server", "-http=:8080", "-redis=redis:6379"]

volumes:
  redis_data: